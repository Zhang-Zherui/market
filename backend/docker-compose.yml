version: "3.8"

services:
  # ===================== MySQL =====================
  mysql:
    image: mysql:5.7
    container_name: market-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      MYSQL_DATABASE: market
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./src/main/resources/db/market.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./src/main/resources/db/xxl_job.sql:/docker-entrypoint-initdb.d/02-xxl-job.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================== Redis =====================
  redis:
    image: redis:6.2
    container_name: market-redis
    restart: always
    command: redis-server --requirepass "1234"
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "1234", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================== RabbitMQ =====================
  rabbitmq:
    image: rabbitmq:3.9-management
    container_name: market-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ===================== Canal（可选） =====================
  canal:
    image: canal/canal-server:v1.1.7
    container_name: market-canal
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "11111:11111"
    environment:
      - canal.instance.master.address=mysql:3306
      - canal.instance.dbUsername=root
      - canal.instance.dbPassword=1234
      - canal.instance.defaultDatabaseName=market
      - canal.instance.filter.regex=market\\..*
    volumes:
      - canal-data:/home/canal/admin

  xxl-job-admin:
    image: xuxueli/xxl-job-admin:2.4.2
    container_name: market-xxl-job-admin
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8088:8080"
    environment:
      PARAMS: >-
        --server.port=8080
        --server.servlet.context-path=/xxl-job-admin
        --spring.datasource.url=jdbc:mysql://mysql:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
        --spring.datasource.username=root
        --spring.datasource.password=1234
        --spring.datasource.driver-class-name=com.mysql.jdbc.Driver
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: market-nacos
    restart: always
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: "MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE="
      NACOS_AUTH_IDENTITY_KEY: "serverIdentity"
      NACOS_AUTH_IDENTITY_VALUE: "security"
      NACOS_AUTH_PLUGIN_NACOS_TOKEN_SECRET_KEY: "MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE="
      JVM_XMS: 256m
      JVM_XMX: 256m
      JVM_XMN: 128m
    ports:
      - "8848:8848"
      - "9848:9848"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  sentinel-dashboard:
    image: eclipse-temurin:8-jre
    container_name: market-sentinel-dashboard
    restart: always
    depends_on:
      nacos:
        condition: service_healthy
    ports:
      - "8858:8858"
    working_dir: /opt/sentinel
    command: >
      sh -c "
      if ! command -v curl >/dev/null 2>&1; then
        apt-get update && apt-get install -y curl;
      fi &&
      if [ ! -f sentinel-dashboard.jar ]; then
        curl -L -o sentinel-dashboard.jar https://github.com/alibaba/Sentinel/releases/download/1.8.6/sentinel-dashboard-1.8.6.jar;
      fi &&
      java -Dserver.port=8858
      -Dcsp.sentinel.dashboard.server=localhost:8858
      -Dproject.name=sentinel-dashboard
      -jar sentinel-dashboard.jar
      "
    extra_hosts:
      - "host.docker.internal:host-gateway"
volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  canal-data:

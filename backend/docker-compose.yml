version: "3.8"

services:
  # ===================== MySQL =====================
  mysql:
    image: mysql:5.7
    container_name: market-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      MYSQL_DATABASE: market
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./src/main/resources/db/market.sql:/docker-entrypoint-initdb.d/01-init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================== Redis =====================
  redis:
    image: redis:6.2
    container_name: market-redis
    restart: always
    command: redis-server --requirepass "1234"
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "1234", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================== RabbitMQ =====================
  rabbitmq:
    image: rabbitmq:3.9-management
    container_name: market-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ===================== Canal（可选） =====================
  canal:
    image: canal/canal-server:v1.1.7
    container_name: market-canal
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "11111:11111"
    environment:
      - canal.instance.master.address=mysql:3306
      - canal.instance.dbUsername=root
      - canal.instance.dbPassword=1234
      - canal.instance.defaultDatabaseName=market
      - canal.instance.filter.regex=market\\..*
    volumes:
      - canal-data:/home/canal/admin
volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  canal-data:

server:
  port: 8081
spring:
  application:
    name: market
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/market?useSSL=false&serverTimezone=UTC
    username: root
    password: 1234
  redis:
    host: localhost
    port: 6379
    password: 1234
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
    database: 6
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
  rabbitmq:
    host: localhost               # 推荐改成 localhost（更稳定）
    port: 5672                    # ← 必须改成 5672（AMQP 协议端口）
    username: guest               # ← 改成 guest
    password: guest               # ← 改成 guest
    virtual-host: /
mybatis-plus:
  type-aliases-package: com.market.entity # 别名扫描包
logging:
  level:
    com.hmdp: debug

# Canal 配置
canal:
  host: 127.0.0.1
  port: 11111
  destination: example
  username: ""
  password: ""
  database: market
  batch-size: 1000

# JWT 配置
jwt:
  secret: marketSecretKeyForJwtTokenGeneration2026MustBeLongEnough
  access-token-ttl: 15    # access token 有效期（分钟）
  refresh-token-ttl: 1440  # refresh token 有效期（分钟），24小时


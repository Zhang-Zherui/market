server:
  port: 8081
spring:
  application:
    name: market
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/market?useSSL=false&serverTimezone=UTC
    username: root
    password: 1234
  redis:
    host: localhost
    port: 6379
    password: 1234
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
    database: 6
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
  rabbitmq:
    host: localhost               # 推荐改成 localhost（更稳定）
    port: 5672                    # ← 必须改成 5672（AMQP 协议端口）
    username: guest               # ← 改成 guest
    password: guest               # ← 改成 guest
    virtual-host: /
mybatis-plus:
  type-aliases-package: com.market.entity # 别名扫描包
logging:
  level:
    com.hmdp: debug

# Canal 配置
canal:
  host: 127.0.0.1
  port: 11111
  destination: example
  username: ""
  password: ""
  database: market
  batch-size: 1000

# JWT 配置
jwt:
  secret: marketSecretKeyForJwtTokenGeneration2026MustBeLongEnough
  # access-token-ttl: 15    # access token 有效期（分钟）
  # refresh-token-ttl: 1440  # refresh token 有效期（分钟），24小时
  access-token-ttl: 144000    # access token 有效期（分钟）
  refresh-token-ttl: 144000  # refresh token 有效期（分钟），24小时
# 邮件配置
mail:
  host: smtp.163.com
  port: 465
  username: a2917820320@163.com
  password: YQqnd36YmKq3rJXK
  ssl: true

xxl:
  job:
    admin:
      addresses: ${XXL_JOB_ADMIN_ADDRESSES:http://localhost:8088/xxl-job-admin}
    accessToken: ${XXL_JOB_ACCESS_TOKEN:}
    executor:
      appname: ${XXL_JOB_EXECUTOR_APPNAME:market-order-executor}
      address: ${XXL_JOB_EXECUTOR_ADDRESS:http://host.docker.internal:9999/}
      ip: ${XXL_JOB_EXECUTOR_IP:host.docker.internal}
      port: ${XXL_JOB_EXECUTOR_PORT:9999}
      logpath: ${XXL_JOB_EXECUTOR_LOGPATH:./logs/xxl-job}
      logretentiondays: ${XXL_JOB_EXECUTOR_LOG_RETENTION_DAYS:30}

rate-limit:
  enabled: ${RATE_LIMIT_ENABLED:false}
  type: ${RATE_LIMIT_TYPE:sentinel}

sentinel:
  enabled: true
  dashboard-server: ${SENTINEL_DASHBOARD_SERVER:localhost:8858}
  api-port: ${SENTINEL_API_PORT:8719}
  client-ip: ${SENTINEL_CLIENT_IP:host.docker.internal}
  nacos:
    server-addr: ${SENTINEL_NACOS_SERVER_ADDR:localhost:8848}
    namespace: ${SENTINEL_NACOS_NAMESPACE:}
    group-id: ${SENTINEL_NACOS_GROUP_ID:SENTINEL_GROUP}
    flow-data-id: ${SENTINEL_FLOW_DATA_ID:market-sentinel-flow-rules}
    username: ${SENTINEL_NACOS_USERNAME:nacos}
    password: ${SENTINEL_NACOS_PASSWORD:nacos}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
